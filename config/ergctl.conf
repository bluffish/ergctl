# ergctl configuration — the one place to tune power states.
# Each state = platform_profile + cardwire GPU mode + CPU boost + EPP.
#   profile : quiet | balanced | performance   (ACPI platform_profile)
#   gpu     : integrated | hybrid | smart       (cardwire mode)
#   boost   : true | false                      (CPU turbo)
#   epp     : power | balance_power | balance_performance | performance

charge_limit = 85

# On battery — minimise draw (dGPU fully off).
battery_profile = quiet
battery_gpu     = integrated
battery_boost   = false
battery_epp     = power

# On AC — dGPU available, balanced.
ac_profile = balanced
ac_gpu     = hybrid
ac_boost   = true
ac_epp     = balance_performance

# Turbo override (`ergctl turbo`) — max performance, even on battery.
turbo_profile = performance
turbo_gpu     = hybrid
turbo_boost   = true
turbo_epp     = performance
