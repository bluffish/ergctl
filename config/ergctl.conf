# ergctl configuration — the one place to tune power states.
# Each state = platform_profile + CPU boost + EPP + dGPU (cardwire) mode.
#   profile : quiet | balanced | performance   (ACPI platform_profile)
#   boost   : true | false                      (CPU turbo)
#   epp     : power | balance_power | balance_performance | performance
#   gpu     : smart (dGPU blocked, auto-unblocked on-demand) | integrated (always
#             blocked) | hybrid (always available)   (cardwire mode)
#
# ergctl drives cardwire's mode per state. Default is `smart`: the dGPU stays blocked
# (iGPU only) and cardwire auto-unblocks it the moment an app opens the GPU, then
# re-blocks + lets RTD3 D3cold it. cardwire's experimental_nvidia_block is kept OFF
# (it wedges this GPU at D0). gpu-guard (apps default to iGPU) + audio-guard (remove
# the HDMI-audio fn that pins the GPU at D0) still apply — toggle with
# `ergctl gpu-guard|audio-guard {on|off}`.
#
# NOTE: ergctl is the sole owner of profile/boost/EPP — install.sh disables asusd's
# own AC/battery profile switching so the two don't race.

charge_limit = 85

# On battery — minimise draw; dGPU blocked but auto-on for apps that need it (smart).
# (Set battery_gpu = integrated to hard-block the dGPU on battery instead.)
battery_profile = quiet
battery_boost   = false
battery_epp     = power
battery_gpu     = smart

# On AC — balanced; dGPU blocked but auto-on for apps that need it (smart).
ac_profile = balanced
ac_boost   = true
ac_epp     = balance_performance
ac_gpu     = smart

# Turbo override (`ergctl turbo`) — max performance, even on battery; dGPU available.
# Note: per-boot (stored in tmpfs); a reboot resets to auto.
turbo_profile = performance
turbo_boost   = true
turbo_epp     = performance
turbo_gpu     = hybrid
