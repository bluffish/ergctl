# ergctl configuration — the one place to tune power states.
# Each state = platform_profile + CPU boost + EPP.
#   profile : quiet | balanced | performance   (ACPI platform_profile)
#   boost   : true | false                      (CPU turbo)
#   epp     : power | balance_power | balance_performance | performance
#
# dGPU power is NOT a state knob: it's handled by NVIDIA RTD3 (D3cold when idle)
# plus the gpu-guard (apps default to the iGPU) and audio-guard (removes the dGPU
# HDMI-audio function that would otherwise pin the GPU at D0). Toggle those with
# `ergctl gpu-guard|audio-guard {on|off}`.
#
# NOTE: ergctl is the sole owner of profile/boost/EPP — install.sh disables asusd's
# own AC/battery profile switching so the two don't race.

charge_limit = 85

# dgpu: on  = dGPU stays on the bus (RTD3-asleep, available via prime-run)
#       off = dGPU is REMOVED from the PCI bus entirely — nothing can wake it
#             (no prime-run until AC/turbo brings it back).

# On battery — minimise draw; dGPU fully removed so nothing can turn it on.
battery_profile = quiet
battery_boost   = false
battery_epp     = power
battery_dgpu    = off

# On AC — balanced; dGPU available.
ac_profile = balanced
ac_boost   = true
ac_epp     = balance_performance
ac_dgpu    = on

# Turbo override (`ergctl turbo`) — max performance, even on battery; brings the
# dGPU back. Note: per-boot (stored in tmpfs); a reboot resets to auto.
turbo_profile = performance
turbo_boost   = true
turbo_epp     = performance
turbo_dgpu    = on
