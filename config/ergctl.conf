# ergctl configuration — the one place to tune power states.
# Each state = platform_profile + CPU boost + EPP + dGPU (cardwire) mode.
#   profile : quiet | balanced | performance   (ACPI platform_profile)
#   boost   : true | false                      (CPU turbo)
#   epp     : power | balance_power | balance_performance | performance
#   gpu     : integrated (cardwire blocks the dGPU render node) | hybrid (available)
#
# ergctl drives cardwire's mode per state. cardwire's experimental_nvidia_block is
# kept OFF (it wedges this GPU at D0); integrated blocks the render node and RTD3
# D3colds the dGPU when idle. gpu-guard (apps default to iGPU) + audio-guard (remove
# the HDMI-audio fn that pins the GPU at D0) still apply — toggle with
# `ergctl gpu-guard|audio-guard {on|off}`.
#
# NOTE: ergctl is the sole owner of profile/boost/EPP — install.sh disables asusd's
# own AC/battery profile switching so the two don't race.

charge_limit = 85

# igpu_dpm: AMD iGPU clock policy — auto (ramp freely) | low (cap clocks) | high.
# low on battery trims iGPU draw under light use; auto on AC keeps 4K smooth.

# On battery — minimise draw; dGPU blocked (integrated); iGPU clocks capped.
battery_profile  = quiet
battery_boost    = false
battery_epp      = power
battery_gpu      = integrated
battery_igpu_dpm = low

# On AC — balanced; dGPU still blocked (integrated) so apps can't randomly wake it.
# Run `ergctl turbo` when you actually want the dGPU (hybrid). integrated on both
# AC + battery also means no cardwire mode-switch (so no GPU flash) on plug/unplug.
ac_profile  = balanced
ac_boost    = true
ac_epp      = balance_performance
ac_gpu      = integrated
ac_igpu_dpm = auto

# Turbo override (`ergctl turbo`) — max performance, even on battery; dGPU available.
# Note: per-boot (stored in tmpfs); a reboot resets to auto.
turbo_profile  = performance
turbo_boost    = true
turbo_epp      = performance
turbo_gpu      = hybrid
turbo_igpu_dpm = auto
