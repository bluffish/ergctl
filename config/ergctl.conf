# ergctl configuration — the one place to tune power states.
# Each state = platform_profile + CPU boost + EPP + dGPU (cardwire) mode.
#   profile : quiet | balanced | performance   (ACPI platform_profile)
#   boost   : true | false                      (CPU turbo)
#   epp     : power | balance_power | balance_performance | performance
#   gpu     : integrated (dGPU blocked) | hybrid (available) | smart (blocked,
#             auto-unblocked on-demand)   (cardwire mode)
#
# ergctl drives cardwire's mode per state, auto-switching on every plug/unplug:
# integrated on battery (dGPU blocked) / hybrid on AC (dGPU available). cardwire's
# experimental_nvidia_block is kept OFF (it wedges this GPU at D0). gpu-guard (apps
# default to iGPU) + audio-guard (remove the HDMI-audio fn that pins the GPU at D0)
# still apply — toggle with `ergctl gpu-guard|audio-guard {on|off}`.
#
# NOTE: ergctl is the sole owner of profile/boost/EPP — install.sh disables asusd's
# own AC/battery profile switching so the two don't race.

charge_limit = 85

# On battery — minimise draw; dGPU blocked (integrated).
battery_profile = quiet
battery_boost   = false
battery_epp     = power
battery_gpu     = integrated

# On AC — balanced; dGPU available (hybrid).
ac_profile = balanced
ac_boost   = true
ac_epp     = balance_performance
ac_gpu     = hybrid

# Turbo override (`ergctl turbo`) — max performance, even on battery; dGPU available.
# Note: per-boot (stored in tmpfs); a reboot resets to auto.
turbo_profile = performance
turbo_boost   = true
turbo_epp     = performance
turbo_gpu     = hybrid
