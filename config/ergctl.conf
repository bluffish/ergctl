# ergctl configuration — the one place to tune power states.
# Each state = platform_profile + CPU boost + EPP + SoC power cap (PPT) + brightness.
#   profile    : quiet | balanced | performance   (ACPI platform_profile)
#   boost      : true | false                      (CPU turbo)
#   epp        : power | balance_power | balance_performance | performance
#   ppt        : "SPL SPPT FPPT" watts via asus-armoury (sustained/long/short SoC
#                power). Clamped to firmware range (this laptop: SPL 15-80, S/FPPT
#                35-80). "off" to leave the firmware default untouched.
#   brightness : OLED backlight percent. Omit / "off" to leave it alone.
#
# dGPU power is NOT a state knob: it's handled by NVIDIA RTD3 (D3cold when idle)
# plus the gpu-guard (apps default to the iGPU) and audio-guard (removes the dGPU
# HDMI-audio function that would otherwise pin the GPU at D0). Toggle those with
# `ergctl gpu-guard|audio-guard {on|off}`.
#
# NOTE: ergctl is the sole owner of these knobs — install.sh disables asusd's
# own AC/battery profile switching so the two don't race.

charge_limit = 85

# On battery — minimise draw. SPL=15 caps sustained package power (boost-off only
# caps frequency); SPPT/FPPT=35 keep short bursts snappy. brightness dims the OLED.
battery_profile    = quiet
battery_boost      = false
battery_epp        = power
battery_ppt        = 15 35 35
battery_brightness = 40

# On AC — balanced, full SoC power, leave brightness as set.
ac_profile    = balanced
ac_boost      = true
ac_epp        = balance_performance
ac_ppt        = 80 80 80
ac_brightness = off

# Turbo override (`ergctl turbo`) — max performance, even on battery.
# Note: per-boot (stored in tmpfs); a reboot resets to auto.
turbo_profile    = performance
turbo_boost      = true
turbo_epp        = performance
turbo_ppt        = 80 80 80
turbo_brightness = off
